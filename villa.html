<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Details | The Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/villa.css">
</head>
<body>

    <div class="page-transition" id="page-transition"></div>

    <div class="interactive-blueprint"></div>

    <a href="vault.html" class="return-link"><span>&larr;</span> Return to Vault</a>

    <main class="asset-showcase">
        
        <h1 class="asset-title" id="prop-title">Loading Asset...</h1>

        <div class="showcase-grid">
            
            <aside class="vertical-filmstrip" id="thumbnail-strip">
                </aside>

            <section class="main-display-area">
                
                <div class="feature-media-container" id="feature-container">
                    </div>

                <div class="property-header">
                    <div class="specs-row">
                        <div class="spec"><span class="num" id="prop-beds">-</span> BEDROOMS</div>
                        <div class="spec"><span class="num" id="prop-baths">-</span> BATHROOMS</div>
                        <div class="spec"><span class="num" id="prop-sqft">-</span> SQFT</div>
                        <div class="spec"><span class="num" id="prop-acres">-</span> ACRES</div>
                    </div>

                    <div class="action-pill-bar">
                        <div class="price-tag" id="prop-price">$0</div>
                        <a href="index.html#contact-info" class="schedule-btn">SCHEDULE PRIVATE TOUR</a>
                    </div>
                </div>

            </section>
        </div>

        <section class="property-context">
            
            <div class="context-story">
                <h2 class="context-title" id="prop-headline">Loading...</h2>
                <div id="prop-desc">
                    <p>Loading property details...</p>
                </div>
            </div>

            <div class="context-amenities">
                <h3 class="amenities-title">Premium Features</h3>
                <ul class="amenities-list" id="prop-amenities">
                    </ul>
            </div>

        </section>

    </main>

    <script src="assets/js/villa.js"></script>
</body>
</html>
