<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Bio Card | Elite Networking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. CORE RESET & VARIABLES --- */
        :root {
            --gold: #c5a059;
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg-dark); 
            color: #f8f8f8; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        /* --- 2. THE BACKGROUND ENGINE --- */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.pexels.com/photos/323780/pexels-photo-323780.jpeg?auto=compress&cs=tinysrgb&w=1260') center/cover no-repeat;
            filter: blur(25px) brightness(0.2); /* Deeper blur for better text contrast */
            z-index: 1;
        }

        /* --- 3. BIO CONTAINER --- */
        .card-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: bioEntry 1.2s var(--transition) forwards;
        }

        @keyframes bioEntry {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- 4. PROFILE SECTION --- */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            margin: 0 auto 25px;
            padding: 4px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .profile-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .agent-name { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.8rem; /* Aggressive mobile downscale */
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px; 
        }

        .agent-title { 
            font-size: 0.7rem; /* Synced with Editorial Title size */
            color: var(--gold); 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            margin-bottom: 40px; 
            display: block; 
            opacity: 0.9;
        }

        /* --- 5. ACTION LINKS (CAPSULE STYLE) --- */
        .links-stack { display: flex; flex-direction: column; gap: 12px; }
        
        .bio-link {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 20px;
            border-radius: 100px; /* Capsule shape synced with main Navbar */
            color: #f8f8f8;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .bio-link:hover {
            background: rgba(197, 160, 89, 0.1);
            border-color: var(--gold);
            transform: translateY(-3px);
        }

        /* --- 6. PRIMARY BUTTON & PULSE --- */
        .bio-link.primary { 
            background: var(--gold); 
            color: #0a0a0a; 
            border: none; 
            font-weight: 700; 
            position: relative;
            z-index: 1;
        }

        .bio-link.primary::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gold);
            border-radius: 100px;
            z-index: -1;
            opacity: 0.4;
            animation: luxuryPulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes luxuryPulse {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.1, 1.4); opacity: 0; }
        }

        .bio-link.primary:hover {
            background: #f8f8f8;
            color: #0a0a0a;
            transform: translateY(-4px);
        }

        /* --- 7. FOOTER --- */
        .return-home { 
            margin-top: 50px; 
            display: block; 
            color: rgba(255,255,255,0.3); 
            font-size: 0.65rem; 
            text-decoration: none; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            transition: color 0.3s ease;
        }
        .return-home:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="card-container">
        <div class="profile-img">
            <img src="assets/img/pent.jpg" alt="Agent Profile">
        </div>

        <h1 class="agent-name">Julian Marcello</h1>
        <span class="agent-title">Luxury Asset Advisor</span>

        <div class="links-stack">
            <a href="https://wa.me/yournumber" class="bio-link primary">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M12.031 6.172c-2.335 0-4.241 1.91-4.241 4.244 0 2.332 1.906 4.242 4.241 4.242 2.33 0 4.24-1.91 4.24-4.242 0-2.334-1.91-4.244-4.24-4.244zm0 15.312C6.91 21.484 2.75 17.324 2.75 12.203c0-5.12 4.16-9.281 9.281-9.281 5.12 0 9.281 4.161 9.281 9.281 0 5.121-4.161 9.281-9.281 9.281z"/>
                </svg>
                DIRECT WHATSAPP
            </a>
            <a href="demo-property.html" class="bio-link">VIEW CURRENT LISTINGS</a>
            <a href="demo-lead.html" class="bio-link">REQUEST HOME VALUATION</a>
            <a href="#" class="bio-link">DOWNLOAD V-CARD</a>
        </div>

        <a href="index.html" class="return-home">BACK TO PORTFOLIO</a>
    </div>

</body>
</html>
